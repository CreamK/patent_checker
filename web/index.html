<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patent Check Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #f4f7f2;
        --bg-1: #dbe8dc;
        --ink: #13271d;
        --ink-soft: #476052;
        --accent: #0d7a5f;
        --warn: #ea6f2d;
        --err: #d63c3c;
        --card: rgba(255, 255, 255, 0.78);
        --line: rgba(16, 42, 33, 0.15);
        --mono: 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
        --sans: 'Space Grotesk', 'Avenir Next', 'Segoe UI', sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(234, 111, 45, 0.12) 0, transparent 35%),
          radial-gradient(circle at 90% 12%, rgba(13, 122, 95, 0.18) 0, transparent 30%),
          linear-gradient(145deg, var(--bg-0), var(--bg-1));
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
        margin-bottom: 20px;
      }

      .title {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--ink-soft);
      }

      .status-chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--card);
        font-size: 13px;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 16px;
        backdrop-filter: blur(6px);
        box-shadow: 0 12px 28px rgba(18, 39, 31, 0.08);
      }

      .panel .head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-soft);
      }

      .panel .body {
        padding: 16px 18px 18px;
      }

      label {
        display: block;
        font-size: 12px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 10px 0 6px;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
        padding: 10px 12px;
        font-size: 14px;
        font-family: var(--sans);
      }

      input[type='file'] {
        padding: 10px;
      }

      .select-box {
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.55);
      }

      .selected {
        margin-top: 8px;
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.45;
      }

      .inline-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(95deg, var(--accent), #23a882);
        transition: transform 120ms ease, opacity 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .muted {
        margin-top: 10px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.75);
      }

      .card .k {
        font-size: 11px;
        color: var(--ink-soft);
        text-transform: none;
      }

      .card .v {
        margin-top: 6px;
        font-size: 22px;
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        font-size: 12px;
        text-align: left;
        padding: 8px 6px;
        vertical-align: top;
      }

      th {
        color: var(--ink-soft);
      }

      .code {
        font-family: var(--mono);
        background: #0f221b;
        color: #defff2;
        border-radius: 12px;
        padding: 12px;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .hint {
        font-size: 12px;
        color: var(--ink-soft);
        margin-bottom: 10px;
      }

      .label-row {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .info-dot {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink-soft);
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        cursor: help;
      }

      .info-dot::after {
        content: attr(data-tip);
        position: absolute;
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%);
        width: 260px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0f221b;
        color: #defff2;
        text-transform: none;
        letter-spacing: 0;
        line-height: 1.4;
        font-size: 11px;
        font-weight: 400;
        white-space: normal;
        opacity: 0;
        visibility: hidden;
        transition: opacity 120ms ease, visibility 120ms ease;
        pointer-events: none;
        z-index: 8;
      }

      .info-dot:hover::after,
      .info-dot:focus-visible::after {
        opacity: 1;
        visibility: visible;
      }

      .input-trace {
        margin-bottom: 12px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.66);
      }

      .trace-title {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 6px;
      }

      .trace-body {
        font-size: 12px;
        line-height: 1.5;
      }

      .trace-body code {
        font-family: var(--mono);
        font-size: 11px;
      }

      .label-primary {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
        text-transform: none;
      }

      .btn-secondary {
        margin-top: 10px;
        width: 100%;
        border: 1px solid var(--accent);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        color: var(--accent);
        background: rgba(13, 122, 95, 0.08);
        transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      }

      .btn-secondary:hover {
        background: rgba(13, 122, 95, 0.16);
        transform: translateY(-1px);
      }

      .btn-secondary:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .progress-wrap {
        margin-top: 10px;
        display: none;
      }

      .progress-wrap.active {
        display: block;
      }

      .progress-bar-outer {
        height: 6px;
        background: var(--line);
        border-radius: 6px;
        overflow: hidden;
      }

      .progress-bar-inner {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #23a882);
        border-radius: 6px;
        transition: width 300ms ease;
      }

      .progress-text {
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 4px;
      }

      .pp-preview {
        margin-top: 8px;
        max-height: 160px;
        overflow: auto;
        font-size: 11px;
        line-height: 1.55;
        color: var(--ink-soft);
        display: none;
      }

      .pp-preview.active {
        display: block;
      }

      .pp-preview .pp-item {
        padding: 4px 0;
        border-bottom: 1px dashed var(--line);
      }

      .pp-preview .pp-item:last-child {
        border-bottom: none;
      }

      .pp-tag {
        display: inline-block;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 6px;
        background: rgba(13, 122, 95, 0.12);
        color: var(--accent);
        margin-left: 4px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <div>
          <h1 class="title">Patent Check</h1>
        </div>
        <div id="status-chip" class="status-chip">当前扫描状态：空闲</div>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="head">输入参数</div>
          <div class="body">
            <label class="label-primary">专利文件（可多选）</label>
            <div class="select-box">
              <input
                id="patent-picker"
                type="file"
                multiple
                accept=".pdf,.doc,.docx,.txt,.md,.json,.xml,.html,.htm"
              />
              <div id="patent-selected" class="selected">未选择</div>
            </div>

            <button id="preprocess-btn" class="btn-secondary" disabled>预处理专利（AI 结构化提取）</button>
            <div id="pp-progress" class="progress-wrap">
              <div class="progress-bar-outer">
                <div id="pp-bar" class="progress-bar-inner"></div>
              </div>
              <div id="pp-text" class="progress-text">准备中...</div>
            </div>
            <div id="pp-preview" class="pp-preview"></div>

            <label class="label-primary">仓库目录（选择整个项目文件夹）</label>
            <div class="select-box">
              <input id="repo-picker" type="file" webkitdirectory directory multiple />
              <div id="repo-selected" class="selected">未选择</div>
            </div>

            <div class="inline-grid">
              <div>
                <label for="timeout">
                  <span class="label-row">
                    超时时间（秒）
                    <span
                      class="info-dot"
                      tabindex="0"
                      data-tip="每次调用云端分析（scanner 或 validator）的最大等待时间。超时会导致本轮失败。单位：秒。"
                      >?</span
                    >
                  </span>
                </label>
                <input id="timeout" type="number" value="600" min="30" step="10" />
              </div>
              <div>
                <label for="model">
                  <span class="label-row">
                    模型（可选）
                    <span
                      class="info-dot"
                      tabindex="0"
                      data-tip="覆盖默认 Claude 模型，例如 sonnet 或 opus。留空则使用本地 Claude 默认模型。"
                      >?</span
                    >
                  </span>
                </label>
                <input id="model" placeholder="opus / sonnet ..." />
              </div>
            </div>

            <div>
              <div>
                <label for="max-patterns">
                  <span class="label-row">
                    最大模式数
                    <span
                      class="info-dot"
                      tabindex="0"
                      data-tip="scanner 输出后保留的技术模式上限（仅保留评分 >= 8 的模式）。"
                      >?</span
                    >
                  </span>
                </label>
                <input id="max-patterns" type="number" value="30" min="1" />
              </div>
            </div>

            <div>
              <label for="max-matches">
                <span class="label-row">
                  最大匹配数
                  <span
                    class="info-dot"
                    tabindex="0"
                    data-tip="validator 结果保留上限，按相似度从高到低排序后截断。"
                    >?</span
                  >
                </span>
              </label>
              <input id="max-matches" type="number" value="50" min="1" />
            </div>

            <button id="run-btn" class="btn">运行扫描</button>
            <div class="muted">路径不手输，直接从选择器导入。</div>
          </div>
        </section>

        <section class="panel">
          <div class="head">输出结果</div>
          <div class="body">
            <div class="cards" id="summary-cards"></div>
            <div class="hint" id="detail-text">等待执行</div>
            <div class="input-trace">
              <div class="trace-title">本次扫描输入</div>
              <div class="trace-body" id="scan-input-box">尚未执行</div>
            </div>

            <div class="row">
              <div>
                <h4>Patterns</h4>
                <div style="overflow:auto; max-height: 240px;">
                  <table>
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Score</th>
                      </tr>
                    </thead>
                    <tbody id="patterns-table"></tbody>
                  </table>
                </div>
              </div>
              <div>
                <h4>Matches</h4>
                <div style="overflow:auto; max-height: 240px;">
                  <table>
                    <thead>
                      <tr>
                        <th>Patent</th>
                        <th>Pattern</th>
                        <th>Level</th>
                        <th>Similarity</th>
                      </tr>
                    </thead>
                    <tbody id="matches-table"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <h4>按专利汇总</h4>
            <div style="overflow:auto; max-height: 200px;">
              <table>
                <thead>
                  <tr>
                    <th>Patent</th>
                    <th>Matches</th>
                    <th>Max Similarity</th>
                  </tr>
                </thead>
                <tbody id="patent-groups-table"></tbody>
              </table>
            </div>

            <h4>STDOUT</h4>
            <div id="stdout-box" class="code">-</div>
            <h4>STDERR</h4>
            <div id="stderr-box" class="code">-</div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const ui = {
        repoPicker: document.getElementById('repo-picker'),
        repoSelected: document.getElementById('repo-selected'),
        patentPicker: document.getElementById('patent-picker'),
        patentSelected: document.getElementById('patent-selected'),
        timeout: document.getElementById('timeout'),
        model: document.getElementById('model'),
        maxPatterns: document.getElementById('max-patterns'),
        maxMatches: document.getElementById('max-matches'),
        runBtn: document.getElementById('run-btn'),
        preprocessBtn: document.getElementById('preprocess-btn'),
        ppProgress: document.getElementById('pp-progress'),
        ppBar: document.getElementById('pp-bar'),
        ppText: document.getElementById('pp-text'),
        ppPreview: document.getElementById('pp-preview'),
        statusChip: document.getElementById('status-chip'),
        detailText: document.getElementById('detail-text'),
        summaryCards: document.getElementById('summary-cards'),
        patternsTable: document.getElementById('patterns-table'),
        matchesTable: document.getElementById('matches-table'),
        patentGroupsTable: document.getElementById('patent-groups-table'),
        scanInputBox: document.getElementById('scan-input-box'),
        stdoutBox: document.getElementById('stdout-box'),
        stderrBox: document.getElementById('stderr-box'),
      }
      const SKIP_DIRS = new Set([
        '.git', 'node_modules', '__pycache__', '.next', '.nuxt', 'dist', 'build',
        '.venv', 'venv', 'env', '.env', 'vendor', '.idea', '.vscode', '.svn',
        '.hg', '.tox', '.mypy_cache', '.pytest_cache', '.ruff_cache', 'coverage',
        '.turbo', '.cache', '.parcel-cache', 'out', '.output', 'target',
        '.gradle', '.DS_Store', 'Pods', 'DerivedData', '.terraform',
      ])
      const SKIP_EXTS = new Set([
        '.png', '.jpg', '.jpeg', '.gif', '.bmp', '.ico', '.svg', '.webp',
        '.mp3', '.mp4', '.avi', '.mov', '.wmv', '.flv', '.wav', '.ogg', '.webm',
        '.zip', '.tar', '.gz', '.bz2', '.rar', '.7z', '.xz', '.zst',
        '.exe', '.dll', '.so', '.dylib', '.bin', '.o', '.a', '.class',
        '.woff', '.woff2', '.ttf', '.otf', '.eot',
        '.pyc', '.pyo', '.whl', '.egg', '.jar',
        '.pdf', '.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx',
        '.db', '.sqlite', '.sqlite3', '.mdb',
        '.iso', '.img', '.dmg', '.deb', '.rpm',
        '.lock', '.map',
      ])
      function filterRepoFiles(fileList) {
        const files = Array.from(fileList || [])
        return files.filter(f => {
          const rel = f.webkitRelativePath || f.name
          const segments = rel.split('/')
          for (const seg of segments) {
            if (SKIP_DIRS.has(seg)) return false
          }
          const dot = rel.lastIndexOf('.')
          if (dot !== -1) {
            const ext = rel.slice(dot).toLowerCase()
            if (SKIP_EXTS.has(ext)) return false
          }
          if (f.size > 2 * 1024 * 1024) return false
          return true
        })
      }

      const ACTIVE_JOB_KEY = 'patent_check_active_job_id'
      const PP_JOB_KEY = 'patent_check_preprocess_job_id'
      let activeJobId = ''
      let ppJobId = ''
      let ppPollTimerId = null
      let pollTimerId = null

      function setRunBusy(isBusy) {
        ui.runBtn.disabled = isBusy
      }

      function saveActiveJob(jobId) {
        const token = String(jobId || '').trim()
        if (!token) return
        activeJobId = token
        localStorage.setItem(ACTIVE_JOB_KEY, token)
      }

      function clearActiveJob() {
        activeJobId = ''
        localStorage.removeItem(ACTIVE_JOB_KEY)
      }

      function getSavedActiveJob() {
        return String(localStorage.getItem(ACTIVE_JOB_KEY) || '').trim()
      }

      function stopPolling() {
        if (pollTimerId !== null) {
          clearTimeout(pollTimerId)
          pollTimerId = null
        }
      }

      function setStatus(text, tone = 'idle') {
        ui.statusChip.textContent = `当前扫描状态：${text}`
        ui.statusChip.style.borderColor = 'var(--line)'
        if (tone === 'run') ui.statusChip.style.borderColor = '#23a882'
        if (tone === 'ok') ui.statusChip.style.borderColor = '#0d7a5f'
        if (tone === 'warn') ui.statusChip.style.borderColor = '#ea6f2d'
        if (tone === 'err') ui.statusChip.style.borderColor = '#d63c3c'
      }

      function renderSummary(summary = {}) {
        const thresholdRaw = Number(summary.hit_similarity_threshold)
        const hitThreshold = Number.isFinite(thresholdRaw) ? thresholdRaw : 0.5
        const hitThresholdText = hitThreshold.toFixed(2)
        const metrics = [
          {
            key: 'patterns',
            label: '技术模式数',
            tip: '扫描阶段提炼出的模式数量（当前仅统计评分大于等于 8 的模式）。',
          },
          {
            key: 'matches',
            label: '匹配条目数',
            tip: '模式与专利两两比对后得到的匹配记录总数。',
          },
          {
            key: 'actionable_matches',
            label: '重点关注数',
            tip: '建议优先核查的匹配数量：高匹配，或中匹配且相似度较高。',
          },
          {
            key: 'files_analyzed',
            label: '已分析源码文件',
            tip: 'scanner 报告的实际参与分析的源码文件数量。',
          },
          {
            key: 'matched_patent_files',
            label: '命中专利数',
            tip: `上传专利中，最大相似度达到 ${hitThresholdText} 及以上的专利文件数量。`,
          },
          {
            key: 'unmatched_patent_files',
            label: '未命中专利数',
            tip: `上传专利中，最大相似度低于 ${hitThresholdText} 的专利文件数量。`,
          },
        ]
        ui.summaryCards.innerHTML = metrics
          .map((item) => {
            const value = summary[item.key] ?? 0
            const tip = String(item.tip || '')
              .replaceAll('&', '&amp;')
              .replaceAll('"', '&quot;')
              .replaceAll('<', '&lt;')
              .replaceAll('>', '&gt;')
            return `<div class="card">
              <div class="k">
                <span class="label-row">
                  ${item.label}
                  <span class="info-dot" tabindex="0" data-tip="${tip}">?</span>
                </span>
              </div>
              <div class="v">${value}</div>
            </div>`
          })
          .join('')
      }

      function renderPatterns(patterns = []) {
        if (!patterns.length) {
          ui.patternsTable.innerHTML = '<tr><td colspan="3">-</td></tr>'
          return
        }
        ui.patternsTable.innerHTML = patterns
          .slice(0, 20)
          .map(
            (p) => `<tr>
              <td>${p.pattern_id || '-'}</td>
              <td>${p.title || '-'}</td>
              <td>${p.score_total ?? '-'}</td>
            </tr>`,
          )
          .join('')
      }

      function fileBaseName(pathLike = '') {
        const token = String(pathLike || '').trim()
        if (!token) return ''
        const chunks = token.split(/[\\\\/]/)
        return chunks[chunks.length - 1] || token
      }

      function buildPatentLookup(usedInputs = null, result = {}) {
        const lookup = new Map()

        const used = Array.isArray(usedInputs?.patents) ? usedInputs.patents : []
        for (const item of used) {
          const fileName = item.file_name || item.uploaded_name || ''
          if (!fileName) continue
          const display = item.title
            ? `${fileName} | ${item.title}`
            : (item.uploaded_name || fileName)
          lookup.set(fileName, display)
        }

        const resultPatents = Array.isArray(result?.patents) ? result.patents : []
        for (const item of resultPatents) {
          const fileName = fileBaseName(item.path || '')
          if (!fileName) continue
          const title = String(item.title || '').trim()
          if (!lookup.has(fileName)) {
            lookup.set(fileName, title ? `${fileName} | ${title}` : fileName)
          }
        }

        return lookup
      }

      function resolvePatentLabel(match = {}, patentLookup = new Map()) {
        const title = String(match.patent_title || '').trim()
        if (title) return title
        const fileName = fileBaseName(match.patent_file || '')
        if (!fileName) return '-'
        return patentLookup.get(fileName) || fileName
      }

      function renderMatches(matches = [], patentLookup = new Map()) {
        if (!matches.length) {
          ui.matchesTable.innerHTML = '<tr><td colspan="4">-</td></tr>'
          return
        }
        ui.matchesTable.innerHTML = matches
          .slice(0, 30)
          .map(
            (m) => `<tr>
              <td>${resolvePatentLabel(m, patentLookup)}</td>
              <td>${m.pattern_title || m.pattern_id || '-'}</td>
              <td>${m.match_level || '-'}</td>
              <td>${typeof m.similarity === 'number' ? m.similarity.toFixed(2) : '-'}</td>
            </tr>`,
          )
          .join('')
      }

      function renderPatentGroups(groups = [], patentLookup = new Map()) {
        if (!groups.length) {
          ui.patentGroupsTable.innerHTML = '<tr><td colspan="3">-</td></tr>'
          return
        }
        ui.patentGroupsTable.innerHTML = groups
          .slice(0, 20)
          .map((g) => {
            const fileName = fileBaseName(g.patent_file || '')
            const fallback = g.patent_title || fileName || '-'
            const label = patentLookup.get(fileName) || fallback
            const maxSim =
              typeof g.max_similarity === 'number' ? g.max_similarity.toFixed(2) : '-'
            return `<tr>
              <td>${label}</td>
              <td>${g.match_count ?? '-'}</td>
              <td>${maxSim}</td>
            </tr>`
          })
          .join('')
      }

      function renderUsedInputs(usedInputs = null, fallbackRepo = '', fallbackPatents = []) {
        const repoLabel = usedInputs?.repo_label || fallbackRepo || '-'
        const repoFileCount = usedInputs?.repo_file_count
        const patents = Array.isArray(usedInputs?.patents)
          ? usedInputs.patents
          : fallbackPatents.map((name) => ({ file_name: name, uploaded_name: name, title: null }))

        const patentLines = patents.length
          ? patents
              .map((item, idx) => {
                const fileName = item.file_name || item.uploaded_name || '-'
                const title = item.title ? ` | 标题: ${item.title}` : ''
                return `${idx + 1}. <code>${fileName}</code>${title}`
              })
              .join('<br/>')
          : '-'

        const repoCountText = typeof repoFileCount === 'number' ? ` (files=${repoFileCount})` : ''
        ui.scanInputBox.innerHTML = `仓库: <code>${repoLabel}</code>${repoCountText}<br/>专利: <br/>${patentLines}`
      }

      function renderCompletedJob(data = {}) {
        const result = data.result_json || {}
        const summary = result.summary || {}
        const patentLookup = buildPatentLookup(data.used_inputs || null, result)
        renderSummary(summary)
        renderPatterns(result.patterns || [])
        renderMatches(result.matches || [], patentLookup)
        renderPatentGroups(result.patent_groups || [], patentLookup)

        const exitCode = Number(data.exit_code)
        if (exitCode === 0) setStatus('通过（0）', 'ok')
        else if (exitCode === 10 || exitCode === 11) setStatus(`告警（${exitCode}）`, 'warn')
        else setStatus(`失败（${Number.isFinite(exitCode) ? exitCode : '-'})`, 'err')

        const stat = data.upload_stats || {}
        renderUsedInputs(data.used_inputs || null, '', [])
        ui.detailText.textContent =
          (result.detail || '无结构化 detail') +
          ` | ${data.duration_ms || data.elapsed_ms || 0} ms | repo_files=${stat.repo_files || 0}, patent_files=${stat.patent_files || 0}`
        ui.stdoutBox.textContent = data.stdout || '-'
        ui.stderrBox.textContent = data.stderr || '-'
      }

      const STAGE_LABELS = {
        init: '初始化',
        scanner: 'Scanner 代码扫描',
        layer1_bm25: 'Layer 1 BM25 召回',
        layer2_rerank: 'Layer 2 轻量复筛',
        layer3_deep: 'Layer 3 深度比对',
        validator: '专利比对验证',
        post_processing: '结果汇总',
      }

      function renderRunningJob(data = {}) {
        const stage = String(data.stage || '').trim()
        const stageLabel = STAGE_LABELS[stage] || stage || '扫描中'
        setStatus(stageLabel, 'run')
        const stat = data.upload_stats || {}
        const elapsedMs = Number(data.elapsed_ms || 0)
        renderUsedInputs(data.used_inputs || null, '', [])
        ui.detailText.textContent =
          (data.detail || '扫描任务执行中') +
          ` | ${Number.isFinite(elapsedMs) ? elapsedMs : 0} ms | repo_files=${stat.repo_files || 0}, patent_files=${stat.patent_files || 0}`
        if (!ui.stdoutBox.textContent || ui.stdoutBox.textContent === '-') {
          ui.stdoutBox.textContent = '(任务运行中，完成后展示)'
        }
      }

      function clearPpState() {
        stopPpPolling()
        ppJobId = ''
        localStorage.removeItem(PP_JOB_KEY)
        ui.ppProgress.classList.remove('active')
        ui.ppPreview.classList.remove('active')
        ui.ppPreview.innerHTML = ''
        ui.ppBar.style.width = '0%'
        ui.ppText.textContent = ''
        ui.preprocessBtn.disabled = !Array.from(ui.patentPicker.files || []).length
        setPpBusy(false)
      }

      async function pollJobStatus(jobId) {
        const token = String(jobId || '').trim()
        if (!token) return
        stopPolling()
        setRunBusy(true)
        saveActiveJob(token)

        const tick = async () => {
          try {
            const resp = await fetch(`/api/run-upload/${encodeURIComponent(token)}`)
            if (resp.status === 404) {
              clearActiveJob()
              stopPolling()
              setRunBusy(false)
              setStatus('空闲', 'idle')
              ui.detailText.textContent = '未找到进行中的任务，请重新发起扫描。'
              return
            }
            const data = await resp.json()
            if (!resp.ok) {
              throw new Error(data.detail || '状态查询失败')
            }

            const status = String(data.status || '').toLowerCase()
            if (status === 'queued' || status === 'running') {
              renderRunningJob(data)
              pollTimerId = setTimeout(tick, 1500)
              return
            }
            if (status === 'completed') {
              renderCompletedJob(data)
              clearActiveJob()
              stopPolling()
              setRunBusy(false)
              return
            }
            if (status === 'failed') {
              setStatus('失败', 'err')
              renderUsedInputs(data.used_inputs || null, '', [])
              ui.detailText.textContent = data.error || data.detail || '扫描任务失败'
              ui.stdoutBox.textContent = data.stdout || '-'
              ui.stderrBox.textContent = data.stderr || '-'
              clearActiveJob()
              stopPolling()
              setRunBusy(false)
              return
            }

            throw new Error(`未知任务状态: ${status || '-'}`)
          } catch (err) {
            const message = String(err)
            if (message.includes('job not found') || message.includes('expired')) {
              clearActiveJob()
              stopPolling()
              setRunBusy(false)
              setStatus('空闲', 'idle')
              ui.detailText.textContent = '未找到进行中的任务，请重新发起扫描。'
              return
            }
            setStatus('请求失败', 'err')
            ui.detailText.textContent = `状态查询失败：${message}`
            pollTimerId = setTimeout(tick, 2000)
          }
        }

        await tick()
      }

      function refreshRepoSelected() {
        const allFiles = Array.from(ui.repoPicker.files || [])
        if (!allFiles.length) {
          ui.repoSelected.textContent = '未选择'
          return
        }
        const first = allFiles[0]
        const root = first.webkitRelativePath ? first.webkitRelativePath.split('/')[0] : first.name
        const filtered = filterRepoFiles(allFiles)
        const skipped = allFiles.length - filtered.length
        let label = `目录：${root} | 代码文件：${filtered.length}`
        if (skipped > 0) label += ` （已过滤 ${skipped} 个非代码文件）`
        ui.repoSelected.textContent = label
      }

      function refreshPatentSelected() {
        const files = Array.from(ui.patentPicker.files || [])
        if (!files.length) {
          ui.patentSelected.textContent = '未选择'
          ppJobId = ''
          localStorage.removeItem(PP_JOB_KEY)
          stopPpPolling()
          ui.preprocessBtn.disabled = true
          ui.ppProgress.classList.remove('active')
          ui.ppPreview.classList.remove('active')
          ui.ppPreview.innerHTML = ''
          ui.ppBar.style.width = '0%'
          ui.ppText.textContent = '准备中...'
          return
        }
        ui.patentSelected.textContent = `文件数：${files.length}`
        ui.preprocessBtn.disabled = false
        ppJobId = ''
        localStorage.removeItem(PP_JOB_KEY)
        ui.ppProgress.classList.remove('active')
        ui.ppPreview.classList.remove('active')
        ui.ppPreview.innerHTML = ''
      }

      function stopPpPolling() {
        if (ppPollTimerId !== null) {
          clearTimeout(ppPollTimerId)
          ppPollTimerId = null
        }
      }

      function setPpBusy(busy) {
        ui.preprocessBtn.disabled = busy
      }

      function renderPpPreview(patents = []) {
        if (!patents.length) {
          ui.ppPreview.classList.remove('active')
          ui.ppPreview.innerHTML = ''
          return
        }
        ui.ppPreview.classList.add('active')
        ui.ppPreview.innerHTML = patents
          .map((p, i) => {
            const title = p.title || p.path || '-'
            const kw = (p.keywords || []).slice(0, 5).map(k => `<span class="pp-tag">${k}</span>`).join('')
            return `<div class="pp-item">${i + 1}. ${title}${kw}</div>`
          })
          .join('')
      }

      async function pollPreprocessStatus(jobId) {
        const token = String(jobId || '').trim()
        if (!token) return
        stopPpPolling()
        setPpBusy(true)
        ppJobId = token
        localStorage.setItem(PP_JOB_KEY, token)
        ui.ppProgress.classList.add('active')
        setStatus('预处理中', 'run')

        const tick = async () => {
          try {
            const resp = await fetch(`/api/preprocess/${encodeURIComponent(token)}`)
            if (resp.status === 404) {
              clearPpState()
              if (!activeJobId) setStatus('空闲', 'idle')
              return
            }
            let data = {}
            try {
              data = await resp.json()
            } catch {
              data = {}
            }
            if (!resp.ok) throw new Error(data.detail || `查询失败 (${resp.status})`)

            const status = String(data.status || '').toLowerCase()
            const done = Number(data.progress_done || 0)
            const total = Math.max(Number(data.progress_total || 1), 1)
            const pct = Math.min(100, Math.round((done / total) * 100))

            ui.ppBar.style.width = pct + '%'
            ui.ppText.textContent = `正在预处理第 ${done} / ${total} 个专利...`
            setStatus(`预处理中 ${done}/${total}`, 'run')

            if (status === 'queued' || status === 'running') {
              renderPpPreview(data.patents || [])
              ppPollTimerId = setTimeout(tick, 2000)
              return
            }
            if (status === 'completed') {
              ui.ppBar.style.width = '100%'
              ui.ppText.textContent = `预处理完成: ${(data.patents || []).length} 个专利`
              setStatus('预处理完成', 'ok')
              renderPpPreview(data.patents || [])
              setPpBusy(false)
              return
            }
            if (status === 'failed') {
              ui.ppText.textContent = `预处理失败: ${data.error || data.detail || ''}`
              ui.ppBar.style.width = '0%'
              setStatus('预处理失败', 'err')
              ppJobId = ''
              localStorage.removeItem(PP_JOB_KEY)
              setPpBusy(false)
              return
            }
            throw new Error(`未知状态: ${status}`)
          } catch (err) {
            const message = String(err)
            if (message.includes('job not found') || message.includes('expired') || message.includes('404')) {
              clearPpState()
              if (!activeJobId) setStatus('空闲', 'idle')
              return
            }
            ui.ppText.textContent = `预处理查询失败: ${message}`
            ppPollTimerId = setTimeout(tick, 3000)
          }
        }
        await tick()
      }

      async function startPreprocess() {
        const patentFiles = Array.from(ui.patentPicker.files || [])
        if (!patentFiles.length) {
          alert('请先选择专利文件')
          return
        }
        if (ppJobId) {
          const ok = confirm('已有预处理结果，是否重新预处理？')
          if (!ok) return
        }

        const form = new FormData()
        for (const file of patentFiles) {
          form.append('patent_files', file, file.name)
        }
        form.append('model', ui.model.value.trim())

        setPpBusy(true)
        ui.ppProgress.classList.add('active')
        ui.ppBar.style.width = '0%'
        ui.ppText.textContent = '正在上传专利文件...'
        ui.ppPreview.classList.remove('active')
        setStatus('预处理上传中', 'run')

        try {
          const resp = await fetch('/api/preprocess', {
            method: 'POST',
            body: form,
          })
          const data = await resp.json()
          if (!resp.ok) throw new Error(data.detail || '提交失败')

          const jobId = String(data.job_id || '').trim()
          if (!jobId) throw new Error('服务端未返回任务ID')
          await pollPreprocessStatus(jobId)
        } catch (err) {
          ui.ppText.textContent = `预处理提交失败: ${err}`
          setStatus('预处理失败', 'err')
          setPpBusy(false)
        }
      }

      async function runScan() {
        if (activeJobId) {
          alert('当前已有扫描任务在运行，请等待完成。')
          return
        }

        const repoFiles = filterRepoFiles(ui.repoPicker.files)
        const patentFiles = Array.from(ui.patentPicker.files || [])
        if (!repoFiles.length) {
          alert('请先选择仓库目录（或所选目录中没有代码文件）')
          return
        }

        const hasPreprocess = Boolean(ppJobId)
        if (!patentFiles.length && !hasPreprocess) {
          alert('请先选择专利文件，或先点击「预处理专利」')
          return
        }

        const form = new FormData()
        for (const file of repoFiles) {
          const filename = file.webkitRelativePath || file.name
          form.append('repo_files', file, filename)
        }
        for (const file of patentFiles) {
          form.append('patent_files', file, file.name)
        }

        form.append('timeout', String(Number(ui.timeout.value) || 600))
        form.append('model', ui.model.value.trim())
        form.append('max_patterns', String(Number(ui.maxPatterns.value) || 30))
        form.append('max_matches', String(Number(ui.maxMatches.value) || 50))
        if (hasPreprocess) {
          form.append('preprocess_job_id', ppJobId)
        }

        setRunBusy(true)
        setStatus('扫描中', 'run')
        ui.detailText.textContent = '正在上传并创建扫描任务，请稍候...'
        ui.stdoutBox.textContent = '-'
        ui.stderrBox.textContent = '-'
        const repoRoot = repoFiles[0]?.webkitRelativePath
          ? repoFiles[0].webkitRelativePath.split('/')[0]
          : 'uploaded-repo'
        renderUsedInputs(
          {
            repo_label: repoRoot,
            repo_file_count: repoFiles.length,
            patents: patentFiles.map((f) => ({ file_name: f.name, uploaded_name: f.name, title: null })),
          },
          repoRoot,
          patentFiles.map((f) => f.name),
        )

        try {
          const resp = await fetch('/api/run-upload', {
            method: 'POST',
            body: form,
          })
          const data = await resp.json()
          if (!resp.ok) {
            throw new Error(data.detail || 'request failed')
          }
          const jobId = String(data.job_id || '').trim()
          if (!jobId) {
            throw new Error('服务端未返回任务ID')
          }
          renderRunningJob(data)
          await pollJobStatus(jobId)
        } catch (err) {
          setStatus('请求失败', 'err')
          ui.detailText.textContent = String(err)
          renderUsedInputs(
            null,
            repoFiles[0]?.webkitRelativePath ? repoFiles[0].webkitRelativePath.split('/')[0] : 'uploaded-repo',
            patentFiles.map((f) => f.name),
          )
          renderPatentGroups([], new Map())
          clearActiveJob()
          stopPolling()
          setRunBusy(false)
        }
      }

      ui.repoPicker.addEventListener('change', refreshRepoSelected)
      ui.patentPicker.addEventListener('change', refreshPatentSelected)
      ui.preprocessBtn.addEventListener('click', startPreprocess)
      ui.runBtn.addEventListener('click', runScan)
      renderSummary({})
      renderPatterns([])
      renderMatches([], new Map())
      renderPatentGroups([], new Map())
      renderUsedInputs(null, '', [])

      async function resumeActiveJobIfNeeded() {
        const savedJobId = getSavedActiveJob()
        if (!savedJobId) {
          setStatus('空闲', 'idle')
          setRunBusy(false)
          return
        }
        setStatus('扫描中', 'run')
        ui.detailText.textContent = '检测到进行中的任务，正在恢复状态...'
        await pollJobStatus(savedJobId)
      }

      async function resumePreprocessIfNeeded() {
        const savedPpId = String(localStorage.getItem(PP_JOB_KEY) || '').trim()
        if (!savedPpId) return
        try {
          const resp = await fetch(`/api/preprocess/${encodeURIComponent(savedPpId)}`)
          if (!resp.ok) {
            localStorage.removeItem(PP_JOB_KEY)
            return
          }
          const data = await resp.json()
          const st = String(data.status || '').toLowerCase()
          if (st === 'completed') {
            ppJobId = savedPpId
            ui.ppProgress.classList.add('active')
            ui.ppBar.style.width = '100%'
            ui.ppText.textContent = `预处理完成: ${(data.patents || []).length} 个专利`
            setStatus('预处理完成', 'ok')
            renderPpPreview(data.patents || [])
            return
          }
          if (st === 'failed') {
            localStorage.removeItem(PP_JOB_KEY)
            return
          }
          ppJobId = savedPpId
          await pollPreprocessStatus(savedPpId)
        } catch (e) {
          localStorage.removeItem(PP_JOB_KEY)
        }
      }

      resumePreprocessIfNeeded()
      resumeActiveJobIfNeeded()
    </script>
  </body>
</html>
